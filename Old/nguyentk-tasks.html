  .today-col { text-align: center; width: 80px; }

  .today-no { background: #f3f4f6; color: #9ca3af; }

  .status-pending { background: #fef3c7; color: #d97706; }
  .status-progress { background: #dbeafe; color: #2563eb; }
  .summary { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .summary-card { background: #fff; border-radius: 8px; padding: 12px 18px; box-shadow: 0 1px 3px rgba(0,0,0,.06); flex: 1; min-width: 140px; }

  .summary-card.done { border-left: 4px solid #16a34a; }
  .summary-card.total { border-left: 4px solid #6366f1; }

function parseDate(s) {
  if (!s) return null;
  const parts = s.split('/');
  if (parts.length !== 3) return null;
  return new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
}

function isToday(today, start, end) {
  const s = parseDate(start);
  const e = parseDate(end);
  if (!s && !e) return false;
  if (s && !e) return today >= s;
  if (!s && e) return today <= e;
  return today >= s && today <= e;
}

function fmtDate(d) {
  return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
}

function render() {
  const today = new Date();
  document.getElementById('todayDisplay').textContent = fmtDate(today);

  const fm = document.getElementById('filterModule').value;
  const fs = document.getElementById('filterSearch').value.toLowerCase();
  const fst = document.getElementById('filterStatus').value;
  const ft = document.getElementById('filterToday').value;

  const filtered = tasks.filter(t => {
    if (fm && t.module !== fm) return false;
    if (fs && !t.task.toLowerCase().includes(fs) && !t.jira.toLowerCase().includes(fs)) return false;
    if (fst && t.status !== fst) return false;
    if (ft === 'yes' && !isToday(today, t.start, t.end)) return false;
    return true;
  });

  let html = '';
  filtered.forEach((t, i) => {
    const needs = isToday(today, t.start, t.end);
    html += `<tr>
      <td class="stt">${i+1}</td>
      <td class="jira">${t.jira || '-'}</td>
      <td><span class="module-badge">${t.module}</span></td>
      <td>${t.task}</td>
      <td>${t.start || '-'}</td>
      <td>${t.end || '-'}</td>
      <td class="today-col">${needs ? '<span class="today-badge today-yes">Phải làm</span>' : '<span class="today-badge today-no">-</span>'}</td>
    </tr>`;
  });
  document.getElementById('tableBody').innerHTML = html;
  updateSummary(today);
}

function updateSummary(today) {
  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'Hoàn thành').length;
  const pending = tasks.filter(t => t.status === 'Chưa thực hiện').length;
  const needToday = tasks.filter(t => isToday(today, t.start, t.end)).length;

  document.getElementById('summaryCards').innerHTML = `
    <div class="summary-card total"><div class="num">${total}</div><div class="label">Tổng số</div></div>
    <div class="summary-card done"><div class="num">${done}</div><div class="label">Hoàn thành</div></div>
    <div class="summary-card todo"><div class="num">${pending}</div><div class="label">Chưa thực hiện</div></div>
    <div class="summary-card today"><div class="num">${needToday}</div><div class="label">Phải làm hôm nay</div></div>
  `;
}

function initFilters() {
  const modules = [...new Set(tasks.map(t => t.module))];
  const sel = document.getElementById('filterModule');
  modules.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    sel.appendChild(opt);
  });
}

initFilters();
render();
